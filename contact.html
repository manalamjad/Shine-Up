<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact - ShineUp</title>
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
    <img src="images/logo.png" class="logo">

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="contact">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you. Reach out anytime!</p>

    <div class="contact-container">

        <!-- Contact Info -->
        <div class="contact-info">
            <p><i class="fas fa-phone"></i> +92 300 1234567</p>
            <p><i class="fas fa-envelope"></i> shineup@gmail.com</p>
            <p><i class="fas fa-map-marker-alt"></i> Karachi, Pakistan</p>
        </div>

        <!-- Contact Form -->
        <form class="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" rows="5"></textarea>
            <button type="submit">Send Message</button>
        </form>

    </div>
</section>

<footer>
    <p>© 2026 ShineUp. Pure Clean • Fresh Shine</p>

    <div class="socials">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
    </div>
</footer>

</body>
</html>
